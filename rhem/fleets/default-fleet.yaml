
apiVersion: flightctl.io/v1beta1
kind: Fleet
metadata:
  name: default
spec:
  selector:
    matchLabels:
      fleet: default
  template:
    metadata:
      labels:
        fleet: default
    spec:
      # os:
      #   image: quay.io/alitestseverything/my-rhel9-bootc:kioskv2
      config:
        - name: "silence-audit-logs"
          inline:
            - path: "/etc/sysctl.d/20-quiet-printk.conf"
              content: "kernel.printk = 3 4 1 3"
              mode: 0644
        - name: gdm-restart-hook
          inline:
            - path: /etc/flightctl/hooks.d/afterupdating/10-restart-gdm.yaml
              content: |-
                - run: /usr/bin/systemctl restart gdm
                  timeout: 10s
                  if:
                    - path: /var/www/html
                      op: [created, updated, deleted]
        - name: kioskapp
          gitRef:
            repository: rhem-default
            targetRevision: main
            path: /rhem/kiosk
            mountPath: /var/www/html
        - name: motd-update
          inline:
            - path: "/etc/motd"
              content: "This system is managed by flightctl."
              mode: 0644
      resources:
        - monitorType: CPU
          alertRules:
            - severity: Warning
              duration: 10m
              percentage: 70
              description: 'CPU load is above 50% for more than 10 minutes'
          samplingInterval: 30s
      systemd:
        matchPatterns:
          - chronyd.service