
apiVersion: flightctl.io/v1beta1
kind: Fleet
metadata:
  name: default
spec:
  selector:
    matchLabels:
      fleet: default
  template:
    metadata:
      labels:
        fleet: default
    spec:
      # os:
      #   image: quay.io/alitestseverything/my-rhel9-bootc:kioskv2
      config:
        - name: kioskapp
          gitRef:
            repository: rhem-default
            targetRevision: main
            path: /rhem/var/www/html
            mountPath: /var/www/html/
        - name: motd-update
          inline:
            - path: "/etc/motd"
              content: "This system is managed by flightctl."
              mode: 0644
      resources:
        - monitorType: CPU
          alertRules:
            - severity: Warning
              duration: 10m
              percentage: 70
              description: 'CPU load is above 50% for more than 10 minutes'
          samplingInterval: 30s
      systemd:
        matchPatterns:
          - chronyd.service